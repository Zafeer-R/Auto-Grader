<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auto-Grader{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f8f9fa;
            padding: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2, h3 { margin-bottom: 0.5rem; color: #154734; }
        .question-block {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .question-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        .points-badge {
            background: #154734;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        input[type="text"], input[type="number"] {
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            width: 200px;
        }
        input:focus { outline: 2px solid #154734; border-color: #154734; }
        .btn {
            background: #154734;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover { background: #1a5c43; }
        .result-correct { color: #198754; font-weight: 600; }
        .result-incorrect { color: #dc3545; font-weight: 600; }
        .score-summary {
            background: #154734;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }
        .feedback { font-size: 0.9rem; color: #6c757d; margin-top: 0.25rem; }
        .error-page {
            text-align: center;
            padding: 3rem;
        }
        .error-page h2 { color: #dc3545; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
