<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auto-Grader{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f8f9fa;
            padding: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2, h3 { margin-bottom: 0.5rem; color: #154734; }
        .question-block {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .question-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        .points-badge {
            background: #154734;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        input[type="text"], input[type="number"] {
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            width: 200px;
        }
        input:focus { outline: 2px solid #154734; border-color: #154734; }
        .btn {
            background: #154734;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover { background: #1a5c43; }
        .result-correct { color: #198754; font-weight: 600; }
        .result-incorrect { color: #dc3545; font-weight: 600; }
        .score-summary {
            background: #154734;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }
        .feedback { font-size: 0.9rem; color: #6c757d; margin-top: 0.25rem; }
        .error-page {
            text-align: center;
            padding: 3rem;
        }
        .error-page h2 { color: #dc3545; }
        .section-block {
            margin-bottom: 2rem;
        }
        .section-header {
            background: #154734;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0;
        }
        .section-header h2 {
            color: white;
            font-size: 1.1rem;
            margin: 0;
        }
        .section-instructions {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-top: none;
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            color: #2e7d32;
        }
        .section-body {
            border: 1px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 1rem;
        }
        .checkpoint-badge {
            background: #ffc107;
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .deferred-badge {
            background: #e9ecef;
            color: #6c757d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .report-fields {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .report-fields input { width: 140px; }
        .report-fields .plus-minus {
            font-size: 1.2rem;
            font-weight: 700;
            color: #154734;
        }
        textarea {
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus { outline: 2px solid #154734; border-color: #154734; }
        .data-table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            font-size: 0.9rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #dee2e6;
            padding: 0.4rem 0.5rem;
            text-align: center;
        }
        .data-table thead th {
            background: #e8f5e9;
            color: #154734;
        }
        .data-table tbody th {
            background: #f8f9fa;
            text-align: left;
            font-weight: 600;
        }
        .data-table input[type="text"] {
            width: 90px;
            padding: 0.3rem;
            text-align: center;
        }
        .cell-value { margin-right: 0.25rem; }
        .cp-toggle {
            border: 1px solid #ced4da;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .cp-toggle.cp-on { background: #d1e7dd; border-color: #198754; color: #0f5132; }
        .cp-toggle.cp-off { background: #f8f9fa; color: #6c757d; }
        .cp-toggle:hover { border-color: #154734; }
        .submissions-table td, .submissions-table th { vertical-align: middle; }
        .ags-chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.78rem;
            margin-right: 0.25rem;
        }
        .ags-posted { background: #d1e7dd; color: #0f5132; }
        .ags-dry { background: #cfe2ff; color: #084298; }
        .ags-failed { background: #f8d7da; color: #842029; cursor: help; }
        .ags-pending { background: #e9ecef; color: #6c757d; }
        .flag-badge { color: #b45309; cursor: help; }
        .consistency-flags {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #664d03;
        }
        .consistency-flags .flag-item { margin-bottom: 0.25rem; }
        .section-score {
            background: #e8f5e9;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #154734;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
